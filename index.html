<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Guess Number Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-card">
        <h2>Guess a number from 1 to 100</h2>
        <p id="message">You number is high</p>
        
        <div class="input-group">
            <input type="number" id="guessInput" value="60">
            <button id="checkBtn">Check</button>
        </div>

        <p class="chances">You have <span id="chanceCount">8</span> chances</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
